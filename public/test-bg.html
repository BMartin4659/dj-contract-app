<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(10, 10, 80, 0.8), rgba(0, 0, 0, 0.8)), url('./dj-background-new.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        .test-box {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .fallback {
            background: red;
            color: white;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="test-box">
        <h1>Background Image Test</h1>
        <p>If you can see this text clearly with a DJ background image, the image is loading correctly.</p>
        <p>Navigate to: <strong>http://localhost:3000/test-bg.html</strong></p>
        <div class="fallback">If you see this red box, the background image failed to load</div>
    </div>
    
    <script>
        // Test if image loads
        const img = new Image();
        img.onload = function() {
            console.log('✅ Background image loaded successfully');
        };
        img.onerror = function() {
            console.log('❌ Background image failed to load');
            document.body.style.background = 'red';
        };
        img.src = './dj-background-new.jpg';
    </script>
</body>
</html>
