<!DOCTYPE html>
<html>
<head>
  <title>Test Email Function</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #45a049;
    }
    #result {
      margin-top: 20px;
      padding: 10px;
      background-color: #f8f8f8;
      border: 1px solid #ddd;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Test Email Function</h1>
  
  <form id="emailForm">
    <div class="form-group">
      <label for="clientName">Client Name:</label>
      <input type="text" id="clientName" value="Test Client" required>
    </div>
    
    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" value="therealdjbobbydrake@gmail.com" required>
    </div>
    
    <div class="form-group">
      <label for="eventType">Event Type:</label>
      <input type="text" id="eventType" value="Test Event" required>
    </div>
    
    <div class="form-group">
      <label for="eventDate">Event Date:</label>
      <input type="text" id="eventDate" value="2025-05-01" required>
    </div>
    
    <div class="form-group">
      <label for="venueName">Venue Name:</label>
      <input type="text" id="venueName" value="Test Venue">
    </div>
    
    <div class="form-group">
      <label for="venueLocation">Venue Location:</label>
      <input type="text" id="venueLocation" value="Test Location">
    </div>
    
    <div class="form-group">
      <label for="startTime">Start Time:</label>
      <input type="text" id="startTime" value="7:00 PM">
    </div>
    
    <div class="form-group">
      <label for="endTime">End Time:</label>
      <input type="text" id="endTime" value="11:00 PM">
    </div>
    
    <div class="form-group">
      <label for="paymentId">Payment ID:</label>
      <input type="text" id="paymentId" value="TEST123">
    </div>
    
    <div class="form-group">
      <label for="totalAmount">Total Amount:</label>
      <input type="text" id="totalAmount" value="100.00">
    </div>
    
    <button type="submit">Send Test Email</button>
  </form>
  
  <div id="result"></div>
  
  <script>
    document.getElementById('emailForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = 'Sending email...';
      
      const data = {
        clientName: document.getElementById('clientName').value,
        email: document.getElementById('email').value,
        eventType: document.getElementById('eventType').value,
        eventDate: document.getElementById('eventDate').value,
        venueName: document.getElementById('venueName').value,
        venueLocation: document.getElementById('venueLocation').value,
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
        paymentId: document.getElementById('paymentId').value,
        totalAmount: document.getElementById('totalAmount').value
      };
      
      fetch('https://us-central1-dj-contract-app.cloudfunctions.net/sendConfirmationEmailHttp', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(data => {
        resultDiv.innerHTML = `
          <h3>Result:</h3>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
      })
      .catch(error => {
        resultDiv.innerHTML = `
          <h3>Error:</h3>
          <pre>${error}</pre>
        `;
      });
    });
  </script>
</body>
</html>
